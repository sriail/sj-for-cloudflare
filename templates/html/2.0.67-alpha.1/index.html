<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Scramjet Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #2d2d2d;
            border-bottom: 1px solid #3d3d3d;
            align-items: center;
        }

        .nav-buttons {
            display: flex;
            gap: 4px;
        }

        button {
            background: #3d3d3d;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #4d4d4d;
        }

        button:active {
            transform: scale(0.95);
        }

        input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #3d3d3d;
            background: #1a1a1a;
            color: white;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #0066cc;
        }

        .status {
            padding: 4px 12px;
            background: #3d3d3d;
            border-radius: 6px;
            font-size: 12px;
            color: #aaa;
        }

        iframe {
            width: 100%;
            flex: 1;
            border: none;
            background: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="toolbar">
            <div class="nav-buttons">
                <button id="backBtn" title="Back">←</button>
                <button id="forwardBtn" title="Forward">→</button>
                <button id="reloadBtn" title="Reload">↻</button>
            </div>
            <input type="text" id="urlInput" placeholder="Enter URL..." value="https://example.com">
            <button id="goBtn">Go</button>
            <div class="status" id="status">Ready</div>
        </div>
        <iframe id="browserFrame" title="Scramjet Browser"></iframe>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@mercuryworkshop/scramjet-controller": "https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet-controller@latest/dist/controller.api.js",
                "@mercuryworkshop/scramjet": "https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@latest/dist/scramjet.js",
                "@mercuryworkshop/epoxy-transport": "https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@latest/dist/index.js"
            }
        }
    </script>

    <script type="module">
        import { defaultConfig } from '@mercuryworkshop/scramjet';
        import { EpoxyTransport } from '@mercuryworkshop/epoxy-transport';

        const iframe = document.getElementById('browserFrame');
        const urlInput = document.getElementById('urlInput');
        const goBtn = document.getElementById('goBtn');
        const backBtn = document.getElementById('backBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const reloadBtn = document.getElementById('reloadBtn');
        const statusEl = document.getElementById('status');

        let scramjet = null;
        let currentFrame = null;
        let currentUrl = 'https://example.com';

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.style.color = isError ? '#ff6b6b' : '#aaa';
            setTimeout(() => {
                if (statusEl.textContent === text) {
                    statusEl.style.color = '#aaa';
                }
            }, 2000);
        }

        function navigate(url) {
            if (!url.trim()) return;

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            currentUrl = url;
            urlInput.value = url;
            setStatus(`Loading ${url}...`);

            if (currentFrame) {
                currentFrame.go(url);
            } else if (scramjet && iframe) {
                currentFrame = scramjet.createFrame(iframe);
                currentFrame.go(url);
            }
        }

        async function initScramjet() {
            setStatus('Initializing Scramjet...');

            try {
                const registration = await navigator.serviceWorker.ready;
                const serviceworker = navigator.serviceWorker.controller || registration.active;

                if (!serviceworker) {
                    throw new Error('Service worker not ready');
                }

                const transport = new EpoxyTransport({
                    wisp: 'wss://wisp.mercurywork.shop/wisp/'
                });
                await transport.init();

                scramjet = new Controller({
                    serviceworker,
                    transport,
                    scramjetConfig: defaultConfig,
                });

                await scramjet.wait();

                setStatus('Scramjet ready!');

                currentFrame = scramjet.createFrame(iframe);
                currentFrame.go(currentUrl);

            } catch (error) {
                console.error('Scramjet init error:', error);
                setStatus(`Error: ${error.message}`, true);
            }
        }

        goBtn.addEventListener('click', () => navigate(urlInput.value));
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') navigate(urlInput.value);
        });

        backBtn.addEventListener('click', () => {
            if (currentFrame) currentFrame.back();
        });

        forwardBtn.addEventListener('click', () => {
            if (currentFrame) currentFrame.forward();
        });

        reloadBtn.addEventListener('click', () => {
            if (currentFrame) currentFrame.reload();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => {
                console.log('Service worker registered');
                initScramjet();
            }).catch(err => {
                console.error('Service worker registration failed:', err);
                setStatus('Service worker failed to register', true);
            });
        } else {
            setStatus('Service workers not supported', true);
        }
    </script>
</body>

</html>
