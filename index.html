<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scramjet</title>
    <link rel="manifest" href="/manifest.json">
    <script type="module">
      // importing the wisp server priority script
    import { wispConfig } from '/wisp/wisp-routes.js';
    window.wispConfig = wispConfig;
    </script>
    <style>
      /* --- CSS Variables / Theming --- */
      :root,
      [data-theme="light"] {
        --bg: #f5f5f5;
        --bg-nav: #ffffff;
        --bg-card: #ffffff;
        --text: #1a1a1a;
        --text-muted: #666;
        --border: #ddd;
        --accent: #8a9bb2;
        --input-bg: #f0f0f0;
        --btn-hover: #e0e0e0;
        --settings-bg: #fafafa;
      }
      [data-theme="dark"] {
        --bg: #121212;
        --bg-nav: #1e1e1e;
        --bg-card: #252525;
        --text: #e0e0e0;
        --text-muted: #999;
        --border: #333;
        --accent: #8a9bb2;
        --input-bg: #2a2a2a;
        --btn-hover: #383838;
        --settings-bg: #252525;
      }

      /* --- Reset & Base --- */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      /* --- Navbar --- */
      #navbar {
        display: flex;
        align-items: center;
        height: 48px;
        padding: 0 12px;
        background: var(--bg-nav);
        border-bottom: 1px solid var(--border);
        gap: 8px;
        z-index: 1000;
        position: relative;
      }
      .nav-center {
        display: flex;
        align-items: center;
        flex: 1;
        gap: 4px;
        min-width: 0;
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .nav-btn {
        background: none;
        border: none;
        color: var(--text);
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .nav-btn:hover {
        background: var(--btn-hover);
      }
      #navbar-form {
        flex: 1;
        display: flex;
        min-width: 0;
      }
      #navbar-url {
        width: 100%;
        padding: 6px 12px;
        font-size: 14px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--input-bg);
        color: var(--text);
        outline: none;
        transition: border 0.2s;
      }
      #navbar-url:focus {
        border-color: var(--accent);
      }

      /* --- Home Content --- */
      #home-content {
        display: flex;
        align-items: center;
        justify-content: center;
        height: calc(100vh - 48px);
      }
      .home-center {
        text-align: center;
      }
      .home-logo {
        width: 190px;
        height: 190px;
        margin-bottom: 24px;
        fill: var(--text); 
        color: var(--text); /* Matches the navbar SVG icons */
      }
      .home-center h1 {
        margin-bottom: 24px;
        font-size: 28px;
        font-weight: 600;
      }
      #home-form {
        display: flex;
        justify-content: center;
      }
      #home-search {
        width: 400px;
        max-width: 90vw;
        padding: 12px 20px;
        font-size: 16px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--input-bg);
        color: var(--text);
        outline: none;
        transition: border 0.2s, box-shadow 0.2s;
      }
      #home-search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(138, 155, 178, 0.2);
      }

      /* --- Frame Container --- */
      #frame-container {
        display: none;
        height: calc(100vh - 48px);
        width: 100%;
      }
      #proxy-frame {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* --- Settings Panel --- */
      #settings-panel {
        display: none;
        position: absolute;
        top: 48px;
        right: 12px;
        width: 320px;
        max-width: calc(100vw - 24px);
        background: var(--settings-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
        z-index: 999;
        padding: 20px;
      }
      .settings-content h2 {
        font-size: 18px;
        margin-bottom: 16px;
      }
      .settings-group {
        margin-bottom: 16px;
      }
      .settings-group label {
        display: block;
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      .settings-group select {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text);
        outline: none;
      }
      .settings-btn {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text);
        cursor: pointer;
        transition: background 0.15s;
      }
      .settings-btn:hover {
        background: var(--btn-hover);
      }
    </style>
  </head>

        </button>
      </div>
    </nav>

    <!-- Settings panel (inline) — color mode only -->
    <div id="settings-panel">
      <div class="settings-content">
        <h2>Settings</h2>
        <div class="settings-group">
          <label for="theme-select">Theme</label>
          <select id="theme-select">
            <option value="system">System (Default)</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
        <button id="settings-save" type="button" class="settings-btn">Save</button>
      </div>
    </div>

    </div>

    <script src="/scramjet/scramjet.js"></script>
    <script src="/controller/controller.api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@3.0.1/dist/index.js"></script>

    <script>
      "use strict";

      // --- Settings Helpers (color mode only) ---
      function loadSettings() {
        const defaults = { theme: "system" };
        try {
          const saved = JSON.parse(localStorage.getItem("proxy-settings"));
          return Object.assign(defaults, saved);
        } catch (e) {
          return defaults;
        }
      }

      function saveSettings(settings) {
        // Wrapped in try/catch in case localStorage is blocked by browser privacy settings
        try {
          localStorage.setItem("proxy-settings", JSON.stringify(settings));
        } catch (e) {
          console.error("Could not save settings to localStorage:", e);
        }
      }

      function applyTheme(theme) {
        let resolved = theme;
        if (theme === "system") {
          resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", resolved);

        // Refresh favicon to match resolved theme color
        updateFavicon();

        // Apply theme to proxy iframe if it exists
        const frame = document.getElementById("proxy-frame");
        if (frame) {
          try {
            frame.contentDocument.documentElement.setAttribute("data-theme", resolved);
          } catch (e) {
            // Cross-origin, ignore
          }
        }
      }

      // --- State ---
      let settings = loadSettings();
      let settingsOpen = false;
      let scramjet = null;
      let frame = null;
      let urlMonitorInterval = null;
      let navbarUrlFocused = false;

      // --- DOM Refs ---
      const iframe = document.getElementById("proxy-frame");
      const navbarUrl = document.getElementById("navbar-url");
      const navbarForm = document.getElementById("navbar-form");
      const homeForm = document.getElementById("home-form");
      const homeSearch = document.getElementById("home-search");
      const homeContent = document.getElementById("home-content");
      const frameContainer = document.getElementById("frame-container");
      const navbar = document.getElementById("navbar");
      const settingsPanel = document.getElementById("settings-panel");
      const themeSelect = document.getElementById("theme-select");
      const saveBtn = document.getElementById("settings-save");

      // --- Favicon ---
      const logoSvg = document.querySelector(".home-logo");
      function updateFavicon() {
        if (!logoSvg) return;
        const textColor = getComputedStyle(document.documentElement).getPropertyValue("--text").trim() || "#e0e0e0";
        const svgString = new XMLSerializer().serializeToString(logoSvg).replace(/currentColor/g, textColor);
        const faviconUrl = "data:image/svg+xml," + encodeURIComponent(svgString);
        let favicon = document.querySelector("link[rel='icon']");
        if (!favicon) {
          favicon = document.createElement("link");
          favicon.rel = "icon";
          document.head.appendChild(favicon);
        }
        favicon.type = "image/svg+xml";
        favicon.href = faviconUrl;
      }

      // --- Apply theme on load ---
      applyTheme(settings.theme);

      // Listen for system theme changes
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
        if (settings.theme === "system") applyTheme("system");
      });

      function norm(u) {
        u = u.trim();
        const isUrl = /^https?:\/\//i.test(u) || (/\.[a-z]{2,}$/i.test(u) && !/\s/.test(u));
        if (isUrl) {
          return u.startsWith("http") ? u : "https://" + u;
        }
        return "https://duckduckgo.com/?q=" + encodeURIComponent(u);
      }

      async function init() {
        try {
          // Wait for the service worker (registered at the bottom) to be active.
          await navigator.serviceWorker.ready;

          const serviceworker =
            navigator.serviceWorker.controller ??
            (await navigator.serviceWorker.ready).active;

          // Pull the classes off the globals (Moved here to avoid crashing the UI if scripts are missing)
          const { Controller } = window.$scramjetController;
          const { defaultConfig } = window.$scramjet;
          const EpoxyTransport = self.EpoxyTransport.default;

          // Connect a transport to a wisp server.
          const wispConfig = window.wispConfig;
          const sortedRoutes = [...wispConfig.wss_routes].sort((a, b) => a.priority - b.priority);
            let transport = null;

              for (const route of sortedRoutes) {
                try {
                   console.log(`[Wisp] Trying ${route.name} (${route.route})`);
                    transport = new EpoxyTransport({ wisp: route.route });
                    await transport.init();
                    console.log(`[Wisp] Connected to ${route.name}`);
                      break;
                  } catch (e) {
                  console.warn(`[Wisp] ${route.name} failed:`, e.message);
                transport = null;
                }
            }

            if (!transport) {
             throw new Error('All wisp servers failed');
          }

          // Create the controller.
          scramjet = new Controller({
            serviceworker,
            transport,
            scramjetConfig: defaultConfig
          });

          await scramjet.wait();

          // Bind a frame to the <iframe>.
          frame = scramjet.createFrame(iframe);
        } catch (e) {
          console.error("Failed to initialize Scramjet:", e);
        }
      }

      // Navigate the iframe to whatever is typed in the URL bar / search box.
      function go(input) {
        if (!frame) {
          console.warn("Scramjet frame not initialized yet.");
          return;
        }
        const url = norm(input);
        navbarUrl.value = url;

        // Show frame, hide home
        homeContent.style.display = "none";
        frameContainer.style.display = "block";

        // Close settings if open
        settingsPanel.style.display = "none";
        settingsOpen = false;

        frame.go(url);

        monitorIframeNavigation();
      }

      function monitorIframeNavigation() {
        if (urlMonitorInterval) {
          clearInterval(urlMonitorInterval);
          urlMonitorInterval = null;
        }

        urlMonitorInterval = setInterval(() => {
          if (!frame || !iframe.contentWindow) {
            clearInterval(urlMonitorInterval);
            return;
          }

          // Don't update if in fullscreen mode
          if (document.fullscreenElement || document.webkitFullscreenElement) return;

          // Don't update if user is typing in the navbar
          if (navbarUrlFocused || document.activeElement === navbarUrl) return;

          try {
            const iframeUrl = iframe.contentWindow.location.href;
            if (iframeUrl && !iframeUrl.startsWith("about:blank")) {
              const decodedUrl = frame.decodeUrl
                ? frame.decodeUrl(iframeUrl)
                : iframeUrl;
              if (decodedUrl && decodedUrl !== navbarUrl.value && decodedUrl !== "about:blank") {
                navbarUrl.value = decodedUrl;
              }
            }
          } catch (e) {
            // Cross-origin access blocked (expected depending on proxy setup)
          }
        }, 500);
      }

      // --- Event Handlers ---
      navbarUrl.addEventListener("focus", () => (navbarUrlFocused = true));
      navbarUrl.addEventListener("blur", () => (navbarUrlFocused = false));

      homeForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const val = homeSearch.value.trim();
        if (val) go(val);
      });

      navbarForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const val = navbarUrl.value.trim();
        if (val) go(val);
      });

      document.getElementById("btn-back").addEventListener("click", () => {
        if (iframe.contentWindow) {
          try { iframe.contentWindow.history.back(); } catch (e) {}
        }
      });

      document.getElementById("btn-forward").addEventListener("click", () => {
        if (iframe.contentWindow) {
          try { iframe.contentWindow.history.forward(); } catch (e) {}
        }
      });

      document.getElementById("btn-reload").addEventListener("click", () => {
        if (iframe.contentWindow) {
          try { iframe.contentWindow.location.reload(); } catch (e) {}
        }
      });

      document.getElementById("btn-home").addEventListener("click", () => {
        if (urlMonitorInterval) {
          clearInterval(urlMonitorInterval);
          urlMonitorInterval = null;
        }
        frameContainer.style.display = "none";
        settingsPanel.style.display = "none";
        settingsOpen = false;
        homeContent.style.display = "flex";
        navbarUrl.value = "";
        homeSearch.value = "";
        homeSearch.focus();
      });

      // Settings logic — color mode only
      document.getElementById("btn-settings").addEventListener("click", () => {
        settingsOpen = !settingsOpen;
        settingsPanel.style.display = settingsOpen ? "block" : "none";
        if (settingsOpen) {
          themeSelect.value = settings.theme;
        }
      });

      saveBtn.addEventListener("click", () => {
        settings.theme = themeSelect.value;
        saveSettings(settings);
        applyTheme(settings.theme);
        settingsPanel.style.display = "none";
        settingsOpen = false;
      });

      // Fullscreen logic
      document.getElementById("btn-fullscreen").addEventListener("click", () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          const elem = document.documentElement;
          if (elem.requestFullscreen) elem.requestFullscreen();
          else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
          else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        } else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
          else if (document.msExitFullscreen) document.msExitFullscreen();
        }
      });

      function handleFullscreenChange() {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          navbar.style.display = "none";
          frameContainer.style.height = "100vh";
        } else {
          navbar.style.display = "flex";
          frameContainer.style.height = "calc(100vh - 48px)";
        }
      }

      document.addEventListener("fullscreenchange", handleFullscreenChange);
      document.addEventListener("webkitfullscreenchange", handleFullscreenChange);

      // Register the service worker, then boot once it's ready.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").then(init);
      }
    </script>
  </body>
</html>
